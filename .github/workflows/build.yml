name: build

on:
  push:
    tags:
    - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v4
      with:
        go-version: 1.24.3

    - name: build
      env:
        CGO_ENABLED: 0
        GOOS: linux
        GOARCH: amd64
      run: |
           go build -buildvcs=false -ldflags="-s -w" -o json-merge-driver -v ./...
           tar czf json-merge-driver.tar.gz json-merge-driver

    - uses: softprops/action-gh-release@v2
      with:
        files: ${{ github.workspace }}/json-merge-driver.tar.gz